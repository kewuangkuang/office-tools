<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Paddle.js OCR 测试</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/@paddlejs-models/ocr@1.2.4/lib/index.js"></script>
<style>
body{font-family:system-ui,sans-serif;max-width:700px;margin:40px auto;padding:0 20px;}
h1{font-size:20px;}
#status{margin:16px 0;padding:12px;border-radius:8px;background:#f0f0f0;font-size:14px;white-space:pre-wrap;}
#status.ok{background:#dcfce7;color:#166534;}
#status.err{background:#fef2f2;color:#991b1b;}
#status.loading{background:#fffbeb;color:#92400e;}
#previewArea img,#previewArea canvas{max-width:100%;border:1px solid #ddd;border-radius:6px;margin:12px 0;}
#fileInput{margin-top:8px;font-size:14px;}
</style>
</head>
<body>
<h1>Paddle.js OCR 测试页</h1>
<p>测试 <code>@paddlejs-models/ocr@1.2.4</code> 通过 UMD CDN 在浏览器中运行中文 OCR。</p>
<div id="status" class="loading">正在加载 OCR 库（约 1.6MB）...</div>
<div>
  <label>上传 PDF 或图片测试：</label><br>
  <input type="file" id="fileInput" accept="image/*,.pdf,application/pdf" style="margin-top:8px;">
</div>
<div id="previewArea"></div>
<h2>识别结果</h2>
<pre id="result" style="background:#f8f8f8;padding:12px;border-radius:8px;min-height:60px;font-size:14px;">等待识别...</pre>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const previewArea = document.getElementById('previewArea');
const fileInput = document.getElementById('fileInput');

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type;
}

function extractText(res) {
  if (!res) return '';
  if (Array.isArray(res.text)) return res.text.join('\n');
  if (typeof res.text === 'string') return res.text;
  return String(res);
}

async function doRecognize(input) {
  setStatus('正在识别...', 'loading');
  const t0 = performance.now();
  try {
    const res = await ocr.recognize(input);
    const dt = ((performance.now() - t0) / 1000).toFixed(2);
    const text = extractText(res);
    resultEl.textContent = '识别耗时：' + dt + 's\n识别结果：\n' + text;
    setStatus('识别完成！耗时 ' + dt + 's', text ? 'ok' : 'err');
  } catch(e) {
    resultEl.textContent = '识别失败：' + e.message + '\n' + e.stack;
    setStatus('识别失败', 'err');
  }
}

async function pdfPageToCanvas(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const scale = 2;
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  return { canvas, totalPages: pdf.numPages };
}

function imageFileToImg(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

// 初始化
(async function() {
  const ocrLib = window.paddlejs && window.paddlejs.ocr;
  if (!ocrLib) {
    setStatus('OCR 库加载失败：window.paddlejs.ocr 不存在', 'err');
    resultEl.textContent = '请检查网络是否正常，或刷新页面重试。\n\nwindow.paddlejs = ' + JSON.stringify(window.paddlejs);
    return;
  }

  setStatus('正在初始化 OCR 模型（首次需从百度 CDN 下载模型，约 10-30 秒）...', 'loading');
  try {
    await ocrLib.init();
  } catch(e) {
    setStatus('模型初始化失败：' + e.message, 'err');
    resultEl.textContent = '模型初始化失败：' + e.message + '\n\n可能是百度模型 CDN 不可达。';
    return;
  }

  // 赋值给全局方便使用
  var ocr = ocrLib;
  setStatus('OCR 就绪！请上传 PDF 或图片。', 'ok');
  resultEl.textContent = '模型加载成功，请上传文件测试。';

  fileInput.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    previewArea.innerHTML = '';

    if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
      setStatus('正在解析 PDF...', 'loading');
      try {
        const info = await pdfPageToCanvas(file);
        info.canvas.style.maxWidth = '100%';
        previewArea.appendChild(info.canvas);
        if (info.totalPages > 1) {
          const p = document.createElement('p');
          p.style.cssText = 'font-size:13px;color:#666;';
          p.textContent = '共 ' + info.totalPages + ' 页，当前识别第 1 页';
          previewArea.appendChild(p);
        }
        await doRecognize(info.canvas);
      } catch(e) {
        setStatus('PDF 解析失败：' + e.message, 'err');
        resultEl.textContent = 'PDF 解析失败：' + e.message;
      }
    } else {
      setStatus('正在加载图片...', 'loading');
      try {
        const img = await imageFileToImg(file);
        img.style.maxWidth = '100%';
        previewArea.appendChild(img);
        await doRecognize(img);
      } catch(e) {
        setStatus('图片加载失败：' + e.message, 'err');
        resultEl.textContent = '图片加载失败：' + e.message;
      }
    }
  };
})();
</script>
</body>
</html>
